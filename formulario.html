<!-- formulario para hacer una reserva -->
        <section class="formulario">
            <h2>Hacer una Reserva</h2>

            <!-- seleccion de sala -->
            <label for="sala">Sala:</label>
            <select id="sala" name="sala">
                <option value="">-- Selecciona una sala --</option>
                <option value="a1">Sala A1 - 4 personas</option>
                <option value="b1">Sala B1 - 8 personas</option>
                <option value="b2">Sala B2 - 8 personas</option>
            </select>

            <!-- fecha y hora -->
            <label for="fecha">Fecha:</label>
            <input type="date" id="fecha" name="fecha">

            <label for="hora_inicio">Hora de inicio:</label>
            <input type="time" id="hora_inicio" name="hora_inicio">

            <label for="hora_fin">Hora de termino:</label>
            <input type="time" id="hora_fin" name="hora_fin">

            <!-- datos del estudiante -->
            <label for="nombre">Nombre completo:</label>
            <input type="text" id="nombre" name="nombre" placeholder="Ej: Juan Perez">

            <label for="rut">RUT:</label>
            <input type="text" id="rut" name="rut" placeholder="Ej: 12345678-9">

            <!-- boton para enviar -->
            <button type="submit">Reservar</button>
        </section>
